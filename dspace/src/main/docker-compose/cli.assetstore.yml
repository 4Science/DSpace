services:
  dspace-cli:
    container_name: "${COMPOSE_PROJECT_NAME:-}dspace-cli"
    environment:
      # This assetstore zip is available from https://github.com/4Science/DSpace-CRIS-Files/releases/tag/cris-2025.02.00
      - LOADASSETS=${LOADASSETS:-https://github.com/4Science/DSpace-CRIS-Files/releases/download/cris-2025.02.00/assetstore.tar.gz}
    entrypoint:
      - /bin/bash
      - '-c'
      - |
        if [ ! -z $${LOADASSETS} ]
        then
          curl $${LOADASSETS} -L -s --output /tmp/assetstore.tar.gz
          cd /dspace
          tar xvfz /tmp/assetstore.tar.gz
        fi

        /dspace/bin/dspace index-discovery -b
        /dspace/bin/dspace oai import
        /dspace/bin/dspace oai clean-cache
