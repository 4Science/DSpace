services:
  dspacedb:
    image: "${DOCKER_REGISTRY:-docker.io}/${DOCKER_OWNER:-4science}/dspace-cris-postgres-loadsql:${DSPACE_VER:-dspace-cris-2025_02_x}"
    environment:
      # This SQL is available from https://github.com/4Science/DSpace-CRIS-Files/releases/tag/cris-2025.02.00
      - LOADSQL=${LOADSQL:-https://github.com/4Science/DSpace-CRIS-Files/releases/download/cris-2025.02.00/db-entities.sql}
  dspace:
    ### OVERRIDE default 'entrypoint' in 'docker-compose.yml ####
    # Ensure that the database is ready BEFORE starting tomcat
    # 1. While a TCP connection to dspacedb port 5432 is not available, continue to sleep
    # 2. Then, run migration latest version of database tables (run with "ignored" in case this SQL data is outdated)
    # 3. Finally, start DSpace
    entrypoint:
      - /bin/bash
      - '-c'
      - |
        while (!</dev/tcp/dspacedb/5432) > /dev/null 2>&1; do sleep 1; done;
        /dspace/bin/dspace database migrate ignored
        java -jar /dspace/webapps/server-boot.jar
